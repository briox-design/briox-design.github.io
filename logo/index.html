<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Export Briox logos in SVG or PNG with custom sizes, inversion options, and quick copy/download.">
    <title>Export Logo</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="logomark.svg" type="image/svg+xml">
    <meta property="og:image" content="logomark.svg">
    <meta name="twitter:image" content="logomark.svg">
    <link rel="stylesheet" href="style.css">
    <meta property="og:image" content="meta-image.png" />
    <meta property="og:title" content="Export Logo" />
    <meta property="og:description" content="Export Briox logos in SVG or PNG with custom sizes, inversion options, and quick copy/download." />
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="logomark.svg" alt="Logomark" class="header-logo">
            <h1>Export Logo</h1>
        </div>
        
        <div class="form-row">
            <div class="form-group">
                <label for="offeringSelect">Offering:</label>
                <select id="offeringSelect">
                    <option value="briox">Briox</option>
                    <option value="lerry">Lerry.ai</option>
                    <option value="edeklarera">Edeklarera</option>
                </select>
            </div>
            <div class="form-group">
                <label for="logoSelect">Select Logo:</label>
                <select id="logoSelect"></select>
            </div>
        </div>

        <div class="form-group">
            <label class="switch-label">Invert Options:</label>
            <div class="switch-row">
                <label class="switch-container">
                    <input type="checkbox" id="invertLogomark">
                    <span class="switch-slider"></span>
                    <span class="switch-text">Invert Logomark</span>
                </label>
                <label class="switch-container">
                    <input type="checkbox" id="invertLogotype">
                    <span class="switch-slider"></span>
                    <span class="switch-text">Invert Logotype</span>
                </label>
            </div>
        </div>

        <div class="form-group">
            <label for="format">Export Format:</label>
            <select id="format">
                <option value="svg">SVG - Scalable Vector Graphics </option>
                <option value="png">PNG - Portable Network Graphic</option>
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="width">Width (px):</label>
                <input type="number" id="width" value="200" min="1">
            </div>
            <div class="form-group">
                <label for="height">Height (px):</label>
                <input type="number" id="height" value="69" min="1">
            </div>
        </div>


        <div class="preview-section">
            <h3>Preview:</h3>
            <div id="preview"></div>
        </div>

        <div class="button-group">
            <button id="downloadBtn" class="export-btn">Download</button>
            <button id="copyBtn" class="copy-btn">Copy to Clipboard</button>
        </div>

        
    </div>
<div class="footer">
            Copyright © 2026 Briox | All Rights Reserved | Last Update: 2026/03/02
        </div>
    <script src="script.js"></script>
</body>
</html>
