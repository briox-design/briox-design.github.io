<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IconVault</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="app">

  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="header">
    <div class="header-inner">
      <a class="logo" href="#">
        <div class="logo-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="3" width="7" height="7" rx="1"/>
            <rect x="14" y="14" width="7" height="7" rx="1"/>
            <rect x="3" y="14" width="7" height="7" rx="1"/>
          </svg>
        </div>
        <span class="logo-text">IconVault</span>
      </a>

      <div class="header-right">
        <span class="badge" id="count-badge">0 icons</span>

        <!-- Theme toggle -->
        <label class="theme-switch" title="Toggle light / dark mode" aria-label="Toggle theme">
          <input type="checkbox" id="theme-toggle" />
          <span class="switch-track">
            <span class="switch-thumb">
              <svg class="switch-icon" id="switch-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
              </svg>
            </span>
          </span>
        </label>

        <button class="btn btn-primary btn-sm" id="header-upload-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Upload
        </button>
      </div>
    </div>
  </header>

  <!-- ── Main ───────────────────────────────────────────────── -->
  <main class="main">

    <!-- Drop zone -->
    <div class="dropzone" id="dropzone">
      <div class="dz-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
      </div>
      <p class="dz-title">Drop SVG icons here</p>
      <p class="dz-subtitle">or <span id="browse-link">browse files</span> to upload</p>
    </div>

    <input type="file" id="file-input" accept=".svg,image/svg+xml" multiple />

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="search-wrap">
        <span class="search-icon">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
        </span>
        <input class="search-input" id="search-input" type="search" placeholder="Search icons…" autocomplete="off" />
      </div>
    </div>

    <!-- Grid -->
    <div id="grid" class="grid"></div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state" style="display:none;">
      <svg class="empty-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="3" width="7" height="7" rx="1"/>
        <rect x="14" y="14" width="7" height="7" rx="1"/>
        <rect x="3" y="14" width="7" height="7" rx="1"/>
      </svg>
      <p class="empty-title" id="empty-title">No icons yet</p>
      <p class="empty-sub" id="empty-sub">Upload your first SVG to get started</p>
      <button class="btn btn-primary btn-md" id="empty-upload-btn">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        Upload SVG Icons
      </button>
    </div>

  </main>
</div>

<!-- Toast container -->
<div class="toast-container" id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
